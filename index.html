<!DOCTYPE html>
      <div class="field">
        <label for="language">لغة الملخص</label>
        <select id="language">
          <option value="ar">العربية</option>
          <option value="en">English</option>
        </select>
      </div>

      <div class="field">
        <label for="ocrLang">لغة OCR</label>
        <select id="ocrLang">
          <option value="auto" selected>AUTO (Arabic + English)</option>
          <option value="ara">Arabic فقط</option>
          <option value="eng">English فقط</option>
          <option value="ara+eng">Arabic + English</option>
          <option value="eng+ara">English + Arabic</option>
        </select>
      </div>

      <div class="field">
        <label for="chatUseDoc">الدردشة: استخدام التفريغ كمرجع</label>
        <select id="chatUseDoc">
          <option value="on" selected>تشغيل</option>
          <option value="off">إيقاف</option>
        </select>
      </div>

      <div class="field">
        <label for="chatSystemPrompt">System Prompt (اختياري)</label>
        <textarea id="chatSystemPrompt" rows="4" placeholder="مثال: أنت مساعد احترافي يجيب بدقة وبأسلوب منظم..."></textarea>
      </div>

      <div class="field" style="margin-top:12px;">
        <button id="saveSettingsBtn" class="btn dark" style="width:100%;">حفظ الإعدادات</button>
        <div class="hint" style="margin-top:8px;">إذا واجهت مشكلة كاش: اعد تثبيت الـPWA أو امسح بيانات الموقع مرة واحدة.</div>
      </div>
    </div>
  </aside>

  <!-- Export Sheet -->
  <div id="exportSheet" class="sheet" aria-hidden="true">
    <div class="head">
      <div>تصدير</div>
      <button id="btnCloseExport" class="xbtn">✕</button>
    </div>
    <div class="row">
      <button id="exportTextPdfBtn" class="btn ghost">تفريغ → PDF</button>
      <button id="exportSummaryPdfBtn" class="btn ghost">ملخص → PDF</button>
      <button id="exportChatPdfBtn" class="btn ghost">دردشة → PDF</button>
      <button id="exportTextDocxBtn" class="btn ghost">تفريغ → Word</button>
      <button id="exportSummaryDocxBtn" class="btn ghost">ملخص → Word</button>
      <button id="exportChatDocxBtn" class="btn ghost">دردشة → Word</button>
    </div>
    <div class="hint" style="margin-top:8px;">PDF يتم عبر نافذة الطباعة لضمان العربية بدون رموز.</div>
  </div>

  <!-- Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html-to-docx-rtl@1.13.0/dist/html-to-docx.umd.js"></script>

  <!-- App (versioned) -->
  <script src="app_ocr.js?v=7"></script>

  <!-- SW Register -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js?v=7").catch(()=>{});
      });
    }
  </script>
</body>
</html>
