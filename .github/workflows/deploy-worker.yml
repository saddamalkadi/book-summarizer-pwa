name: Deploy Keys Worker

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Only verify secrets + live health, do not deploy"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-keys-worker
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify required secrets
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          set -e
          ok=1
          [ -n "$CF_API_TOKEN" ] || { echo "::error::CF_API_TOKEN is missing from repo secrets"; ok=0; }
          [ -n "$CF_ACCOUNT_ID" ] || { echo "::error::CF_ACCOUNT_ID is missing from repo secrets"; ok=0; }
          [ "$ok" = "1" ] || exit 2
          echo "✓ Required repo secrets present"

      - name: Show live worker state (before)
        run: |
          echo "## /health (before)" | tee -a $GITHUB_STEP_SUMMARY
          curl -sS https://api.saddamalkadi.com/health | tee /tmp/before.json | python3 -m json.tool | tee -a $GITHUB_STEP_SUMMARY || true
          echo "## /auth/config (before)" | tee -a $GITHUB_STEP_SUMMARY
          curl -sS https://api.saddamalkadi.com/auth/config | python3 -m json.tool | tee -a $GITHUB_STEP_SUMMARY || true
          echo "## gateway probe (before)" | tee -a $GITHUB_STEP_SUMMARY
          curl -sS -X POST -H 'Content-Type: application/json' -H 'Origin: https://app.saddamalkadi.com' \
            https://api.saddamalkadi.com/v1/chat/completions \
            -d '{"model":"openrouter/auto","messages":[{"role":"user","content":"x"}]}' \
            | python3 -m json.tool | tee -a $GITHUB_STEP_SUMMARY || true

      - name: Install wrangler
        run: npm install -g wrangler@3

      - name: Deploy keys-worker (wrangler)
        if: ${{ inputs.dry_run != true }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          echo "Deploying keys-worker via wrangler.jsonc…"
          wrangler deploy --config wrangler.jsonc

      - name: Wait for propagation
        if: ${{ inputs.dry_run != true }}
        run: sleep 12

      - name: Show live worker state (after)
        run: |
          echo "## /health (after)" | tee -a $GITHUB_STEP_SUMMARY
          curl -sS https://api.saddamalkadi.com/health | python3 -m json.tool | tee -a $GITHUB_STEP_SUMMARY || true
          echo "## /auth/config (after)" | tee -a $GITHUB_STEP_SUMMARY
          curl -sS https://api.saddamalkadi.com/auth/config | python3 -m json.tool | tee -a $GITHUB_STEP_SUMMARY || true
          echo "## gateway probe (after)" | tee -a $GITHUB_STEP_SUMMARY
          curl -sS -X POST -H 'Content-Type: application/json' -H 'Origin: https://app.saddamalkadi.com' \
            https://api.saddamalkadi.com/v1/chat/completions \
            -d '{"model":"openrouter/auto","messages":[{"role":"user","content":"x"}]}' \
            | python3 -m json.tool | tee -a $GITHUB_STEP_SUMMARY || true
          echo ""
          echo "### Interpretation" | tee -a $GITHUB_STEP_SUMMARY
          echo "- upstream_key_valid=false means OPENROUTER_API_KEY is REVOKED by OpenRouter; rotate via 'wrangler secret put OPENROUTER_API_KEY' or Cloudflare Dashboard." | tee -a $GITHUB_STEP_SUMMARY
          echo "- upstream_key_valid=true means chat will work end-to-end." | tee -a $GITHUB_STEP_SUMMARY
