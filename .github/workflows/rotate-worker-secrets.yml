name: Rotate Worker Secrets and Verify

# This workflow closes the entire loop end-to-end:
# 1) Sets APP_ADMIN_PASSWORD on the live sadam-key worker (to ADMIN_PASSWORD input, default "123456").
# 2) Sets OPENROUTER_API_KEY on the live sadam-key worker from repo Actions secret.
# 3) Redeploys keys-worker.js from THIS commit so code + secrets match and no stale deployment serves.
# 4) Probes live /health, /auth/config, /auth/diagnose, /v1/credits, /v1/chat/completions.
# 5) Fails loudly if any probe proves the rotation did not take effect.
#
# Required repo Actions secrets:
#   CF_API_TOKEN          — Cloudflare API token with Workers Scripts:Edit + Workers KV:Edit
#   CF_ACCOUNT_ID         — Cloudflare Account ID
#   OPENROUTER_API_KEY    — a valid OpenRouter key (verify locally: curl -H 'Authorization: Bearer <KEY>' https://openrouter.ai/api/v1/credits)
# Optional repo Actions secrets for verification-email delivery:
#   RESEND_API_KEY        — Resend API key for signup verification + resend emails
# Optional repo Actions vars/secrets:
#   MAIL_FROM / EMAIL_FROM — verified sender identity for transactional mail
#
# Optional inputs when dispatched manually:
#   admin_password        — admin password to bind (defaults to 123456, matches user-provided RC test password)

on:
  workflow_dispatch:
    inputs:
      admin_password:
        description: "APP_ADMIN_PASSWORD to bind (leave blank to use 123456)"
        required: false
        type: string
        default: "123456"
  push:
    branches:
      - main
    paths:
      - ".github/rotate-trigger"
      - ".github/workflows/rotate-worker-secrets.yml"

permissions:
  contents: read
  checks: read
  statuses: read

concurrency:
  group: rotate-sadam-key
  cancel-in-progress: false

jobs:
  rotate:
    runs-on: ubuntu-latest
    env:
      WORKER_NAME: sadam-key
      CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      ADMIN_PASSWORD_INPUT: ${{ github.event.inputs.admin_password }}
      OR_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      RESEND_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_KEY_FALLBACK: ${{ secrets.TRANSACTIONAL_EMAIL_API_KEY }}
      MAIL_FROM_VALUE: ${{ vars.MAIL_FROM }}
      MAIL_FROM_SECRET: ${{ secrets.MAIL_FROM }}
      EMAIL_FROM_VALUE: ${{ vars.EMAIL_FROM }}
      EMAIL_FROM_SECRET: ${{ secrets.EMAIL_FROM }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # The Cloudflare "Workers Builds" GitHub app auto-deploys this worker on every push,
      # racing with our wrangler deploy and often leaving a newer uploaded-but-undeployed
      # version that triggers error 10215 on classic `/secrets` edits. Waiting for that
      # check to complete (on this exact commit SHA) before we mutate secrets eliminates the
      # race and allows the classic (simplest) secret-put path to succeed.
      - name: Wait for Cloudflare Workers Builds (sadam-key) to finish on this commit
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -e
          DEADLINE=$(( $(date +%s) + 420 ))
          while :; do
            curl -sS -o /tmp/checks.json \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H 'Accept: application/vnd.github+json' \
              "https://api.github.com/repos/${REPO}/commits/${SHA}/check-runs?per_page=100"
            STATUS=$(python3 -c "
          import json
          d = json.load(open('/tmp/checks.json'))
          rs = [r for r in d.get('check_runs', []) if r.get('name') == 'Workers Builds: sadam-key']
          if not rs:
              print('NONE|')
          else:
              r = rs[0]
              print((r.get('status') or '?') + '|' + (r.get('conclusion') or ''))
          ")
            echo "- Workers Builds status = $STATUS"
            PHASE=$(printf '%s' "$STATUS" | cut -d'|' -f1)
            CONCL=$(printf '%s' "$STATUS" | cut -d'|' -f2)
            if [ "$PHASE" = "completed" ]; then
              if [ "$CONCL" = "success" ]; then
                echo "Workers Builds succeeded; safe to rotate secrets."
              else
                echo "::warning::Workers Builds concluded '$CONCL'; proceeding anyway (secrets path still valid)."
              fi
              break
            fi
            if [ "$(date +%s)" -ge "$DEADLINE" ]; then
              echo "::warning::Timed out waiting for Workers Builds ($PHASE); proceeding."
              break
            fi
            sleep 12
          done

      - name: Verify required repo Actions secrets are present
        run: |
          set -e
          missing=""
          [ -n "${{ secrets.CF_API_TOKEN }}" ] || missing="$missing CF_API_TOKEN"
          [ -n "${{ secrets.CF_ACCOUNT_ID }}" ] || missing="$missing CF_ACCOUNT_ID"
          [ -n "${{ secrets.OPENROUTER_API_KEY }}" ] || missing="$missing OPENROUTER_API_KEY"
          if [ -n "$missing" ]; then
            echo "::error::Missing repo Actions secrets:${missing}"
            echo ""
            echo "## Missing repo Actions secrets" >> $GITHUB_STEP_SUMMARY
            echo "Add these at https://github.com/${{ github.repository }}/settings/secrets/actions :" >> $GITHUB_STEP_SUMMARY
            echo "- **CF_API_TOKEN** (Cloudflare API token, needs Workers Scripts:Edit + Workers KV:Edit)" >> $GITHUB_STEP_SUMMARY
            echo "- **CF_ACCOUNT_ID**" >> $GITHUB_STEP_SUMMARY
            echo "- **OPENROUTER_API_KEY** (a valid OpenRouter key)" >> $GITHUB_STEP_SUMMARY
            exit 2
          fi

      - name: Pre-check live runtime state
        run: |
          {
            echo "## Pre-check: live runtime state (before rotate)"
            echo '### /health'
            curl -sS https://api.saddamalkadi.com/health | python3 -m json.tool || true
            echo '### /auth/config'
            curl -sS https://api.saddamalkadi.com/auth/config | python3 -m json.tool || true
            echo '### /auth/diagnose (admin email, empty pw)'
            curl -sS -X POST -H 'Content-Type: application/json' https://api.saddamalkadi.com/auth/diagnose \
              -d '{"email":"tntntt830@gmail.com","password":""}' | python3 -m json.tool || true
          } | tee -a "$GITHUB_STEP_SUMMARY"

      # Wrangler v4 `secret put` has intermittently failed in CI against this account; v3 is the
      # stable path for Workers Secrets + deploy used across Cloudflare docs.
      - name: Install wrangler (v3 pinned for secrets + deploy)
        run: |
          npm install -g wrangler@3.78.0
          wrangler --version
          echo "- wrangler version: $(wrangler --version 2>&1 | head -n1)" >> "$GITHUB_STEP_SUMMARY"

      - name: Verify wrangler can reach the worker
        run: |
          set +e
          echo "## wrangler reachability" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          wrangler whoami 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          echo "---" >> "$GITHUB_STEP_SUMMARY"
          wrangler deployments list --name "$WORKER_NAME" 2>&1 | head -40 | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Pre-mutation dump of /workers/scripts/{name}/settings (identify shadowing plaintext vars)
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        continue-on-error: true
        run: |
          set +e
          SCODE=$(curl -sS -o /tmp/pre_settings.json -w "%{http_code}" \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/scripts/${WORKER_NAME}/settings" \
            -H "Authorization: Bearer ${CF_API_TOKEN}")
          python3 -c "
          import json
          with open('/tmp/pre_settings.json') as f: data = json.load(f)
          result = data.get('result') if isinstance(data, dict) else data
          lines = []
          if isinstance(result, dict):
              for b in (result.get('bindings') or []):
                  name = b.get('name', '?')
                  btype = b.get('type', '?')
                  extra = ''
                  if btype == 'plain_text':
                      val = b.get('text') or ''
                      extra = f' len={len(val)} starts={val[:6]!r}'
                  lines.append(f'{name} [{btype}]{extra}')
          open('/tmp/pre_settings_summary.txt','w').write('\n'.join(lines))
          " || echo "(summary python failed)" > /tmp/pre_settings_summary.txt
          SUMMARY=$(cat /tmp/pre_settings_summary.txt | tr '\n' '|')
          RAW=$(head -c 1800 /tmp/pre_settings.json | tr '\n\r\t' '   ')
          printf '::notice title=pre-settings-summary (HTTP %s)::%s\n' "$SCODE" "$SUMMARY"
          printf '::notice title=pre-settings-raw (HTTP %s)::%s\n' "$SCODE" "$RAW"
          {
            echo "## Pre-mutation script /settings (HTTP $SCODE)"
            echo '```'
            cat /tmp/pre_settings_summary.txt
            echo ''
            echo 'raw (first 3500):'
            head -c 3500 /tmp/pre_settings.json
            echo ''
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Clean up stale KV admin password fallback (forces env var to be authoritative)
        continue-on-error: true
        run: |
          set +e
          echo "## KV cleanup" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          wrangler kv key delete \
            --binding USER_DATA \
            --namespace-id 49d87e2d4989452fb3c680ad024ae5b7 \
            '_config:admin_password' \
            --remote 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Validate OPENROUTER_API_KEY against OpenRouter before binding
        run: |
          set -e
          OR_TRIM=$(python3 -c "import os; print((os.environ.get('OR_KEY') or '').strip())")
          if [ -z "$OR_TRIM" ]; then
            echo "::error::OPENROUTER_API_KEY secret is empty in this workflow run"
            exit 2
          fi
          RESP=$(curl -sS -o /tmp/or.json -w "%{http_code}" -H "Authorization: Bearer $OR_TRIM" https://openrouter.ai/api/v1/credits || true)
          printf '::notice title=openrouter-probe::HTTP %s body=%s\n' "$RESP" "$(head -c 200 /tmp/or.json)"
          if [ "$RESP" != "200" ]; then
            echo "::error::The OPENROUTER_API_KEY in repo secrets is NOT accepted by OpenRouter (got $RESP). Update the repo Actions secret with a key that works."
            exit 3
          fi

      # Cloudflare rejects `wrangler secret put` until the script exists on the account.
      # Flow: deploy code → bind both secrets → deploy again so custom-domain traffic and
      # secret bindings stay on one consistent script revision (wrangler v3).
      - name: Deploy keys-worker.js (required before secret put)
        run: |
          set -e
          wrangler deploy --config wrangler.jsonc | tee /tmp/deploy_pre.txt
          echo "## wrangler deploy (pre-secrets)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -80 /tmp/deploy_pre.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      # With Workers Builds already finished (see wait-step above), our `wrangler deploy` is
      # the latest deployed version — classic `wrangler secret put` can modify secrets without
      # triggering Cloudflare error 10215. Legacy secrets are script-level, preserved across
      # subsequent deploys.
      - name: Bind APP_ADMIN_PASSWORD (wrangler secret put, script-level)
        run: |
          set -e
          ADMIN_PW="${ADMIN_PASSWORD_INPUT:-123456}"
          if [ -z "$ADMIN_PW" ]; then ADMIN_PW="123456"; fi
          ADMIN_TRIM=$(printf '%s' "$ADMIN_PW" | python3 -c "import sys; print(sys.stdin.read().strip())")
          ok=0
          for attempt in 1 2 3 4 5; do
            if printf '%s' "$ADMIN_TRIM" | wrangler secret put APP_ADMIN_PASSWORD --config wrangler.jsonc; then
              ok=1; break
            fi
            echo "::warning::wrangler secret put APP_ADMIN_PASSWORD failed (attempt $attempt)"; sleep 20
          done
          [ "$ok" = "1" ] || { echo "::error::secret put APP_ADMIN_PASSWORD failed"; exit 4; }
          echo "- APP_ADMIN_PASSWORD bound (len=$(printf '%s' "$ADMIN_TRIM" | wc -c))" >> "$GITHUB_STEP_SUMMARY"

      - name: Bind OPENROUTER_API_KEY (wrangler secret put, script-level)
        run: |
          set -e
          OR_TRIM=$(python3 -c "import os; print((os.environ.get('OR_KEY') or '').strip())")
          ok=0
          for attempt in 1 2 3 4 5; do
            if printf '%s' "$OR_TRIM" | wrangler secret put OPENROUTER_API_KEY --config wrangler.jsonc; then
              ok=1; break
            fi
            echo "::warning::wrangler secret put OPENROUTER_API_KEY failed (attempt $attempt)"; sleep 20
          done
          [ "$ok" = "1" ] || { echo "::error::secret put OPENROUTER_API_KEY failed"; exit 4; }
          echo "- OPENROUTER_API_KEY bound (len=$(printf '%s' "$OR_TRIM" | wc -c))" >> "$GITHUB_STEP_SUMMARY"

      - name: Bind RESEND_API_KEY when available (verification email delivery)
        continue-on-error: true
        run: |
          set +e
          RESEND_TRIM=$(python3 -c "import os; print((os.environ.get('RESEND_KEY') or os.environ.get('RESEND_KEY_FALLBACK') or '').strip())")
          if [ -z "$RESEND_TRIM" ]; then
            echo "::warning::No RESEND_API_KEY/TRANSACTIONAL_EMAIL_API_KEY found in repo secrets; verification email delivery may fail."
            echo "- RESEND_API_KEY: not provided by repo secrets" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          ok=0
          for attempt in 1 2 3 4 5; do
            if printf '%s' "$RESEND_TRIM" | wrangler secret put RESEND_API_KEY --config wrangler.jsonc; then
              ok=1; break
            fi
            echo "::warning::wrangler secret put RESEND_API_KEY failed (attempt $attempt)"; sleep 20
          done
          [ "$ok" = "1" ] && echo "- RESEND_API_KEY bound (len=$(printf '%s' "$RESEND_TRIM" | wc -c))" >> "$GITHUB_STEP_SUMMARY"

      - name: Upsert MAIL_FROM / EMAIL_FROM plain vars when available
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        continue-on-error: true
        run: |
          set +e
          MAIL_FROM_TRIM=$(python3 -c "import os; print((os.environ.get('MAIL_FROM_VALUE') or os.environ.get('MAIL_FROM_SECRET') or '').strip())")
          EMAIL_FROM_TRIM=$(python3 -c "import os; print((os.environ.get('EMAIL_FROM_VALUE') or os.environ.get('EMAIL_FROM_SECRET') or '').strip())")
          [ -z "$MAIL_FROM_TRIM" ] && [ -z "$EMAIL_FROM_TRIM" ] && {
            echo "::warning::MAIL_FROM/EMAIL_FROM not provided; using worker defaults."
            exit 0
          }
          python3 - <<'PY'
import json, os, urllib.request
acc=os.environ.get('CF_ACCOUNT_ID','').strip()
tok=os.environ.get('CF_API_TOKEN','').strip()
name=os.environ.get('WORKER_NAME','').strip()
mail=os.environ.get('MAIL_FROM_TRIM','').strip()
email=os.environ.get('EMAIL_FROM_TRIM','').strip()
if not acc or not tok or not name:
    raise SystemExit(0)
url=f"https://api.cloudflare.com/client/v4/accounts/{acc}/workers/scripts/{name}/settings"
req=urllib.request.Request(url,headers={"Authorization":f"Bearer {tok}"})
with urllib.request.urlopen(req,timeout=20) as r:
    data=json.loads(r.read().decode() or '{}')
res=data.get('result') or {}
bindings=res.get('bindings') or []
bindings=[b for b in bindings if b.get('name') not in ('MAIL_FROM','EMAIL_FROM')]
if mail:
    bindings.append({"type":"plain_text","name":"MAIL_FROM","text":mail})
if email:
    bindings.append({"type":"plain_text","name":"EMAIL_FROM","text":email})
payload=json.dumps({"bindings":bindings}).encode()
req2=urllib.request.Request(url,method='PATCH',data=payload,headers={
    "Authorization":f"Bearer {tok}",
    "Content-Type":"application/json"
})
with urllib.request.urlopen(req2,timeout=25) as r2:
    out=r2.read().decode()
print(out[:600])
PY

      # Legacy bind names we want to purge so getServerKey() cannot fall back to a stale value
      # (the worker reads OPENROUTER_API_KEY || OPEN_ROUTER_API_KEY || OPENROUTER_KEY).
      - name: Delete stale OR key aliases if present
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        continue-on-error: true
        run: |
          for stale in OPEN_ROUTER_API_KEY OPENROUTER_KEY; do
            CODE=$(curl -sS -o /tmp/del.json -w "%{http_code}" \
              -X DELETE "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/scripts/${WORKER_NAME}/secrets/$stale" \
              -H "Authorization: Bearer ${CF_API_TOKEN}")
            echo "- DELETE $stale HTTP $CODE" >> "$GITHUB_STEP_SUMMARY"
          done

      # Final wrangler deploy after secrets are attached. Because the secrets are now
      # script-level (classic wrangler secret put) they persist across this deploy, and the
      # resulting version carries both the code and the freshly-bound secrets as its active
      # bindings. This is the single authoritative post-rotation deploy.
      - name: Final wrangler deploy (publish code + script-level secrets together)
        run: |
          set -e
          wrangler deploy --config wrangler.jsonc | tee /tmp/deploy_final.txt
          {
            echo "## wrangler deploy (final, after secrets)"
            echo '```'
            tail -80 /tmp/deploy_final.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Diagnostic — dump full script settings (binding-level shadows + env vars)
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        continue-on-error: true
        run: |
          set +e
          echo "## Script /settings (env-vars + bindings present on the deployed script)" >> "$GITHUB_STEP_SUMMARY"
          SCODE=$(curl -sS -o /tmp/settings.json -w "%{http_code}" \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/scripts/${WORKER_NAME}/settings" \
            -H "Authorization: Bearer ${CF_API_TOKEN}")
          python3 - <<'PY' > /tmp/settings_summary.txt || cat /tmp/settings.json
          import json
          with open('/tmp/settings.json') as f:
              data = json.load(f)
          result = data.get('result') if isinstance(data, dict) else data
          # Extract binding names + types + textual value preview (truncated for safety)
          summary = []
          if isinstance(result, dict):
              bindings = result.get('bindings') or []
              for b in bindings:
                  name = b.get('name', '?')
                  btype = b.get('type', '?')
                  preview = ''
                  if btype in ('plain_text', 'json'):
                      val = b.get('text') or b.get('json') or ''
                      if isinstance(val, str):
                          preview = f' len={len(val)} starts={val[:4]}'
                  summary.append(f'- {name} [{btype}]{preview}')
          else:
              summary.append('result was not a dict')
          print('\n'.join(summary))
          PY
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "HTTP $SCODE" >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/settings_summary.txt >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo "(full raw /settings JSON, first 4000 bytes)" >> "$GITHUB_STEP_SUMMARY"
          head -c 4000 /tmp/settings.json >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          # Print BOTH a short annotation AND the full first 2500 bytes as separate notices.
          SUM=$(head -c 4000 /tmp/settings_summary.txt)
          printf '::notice title=script-settings-summary (%s)::%s\n' "$SCODE" "$SUM"
          FULL=$(python3 -c "import json; print(json.dumps(json.load(open('/tmp/settings.json')))[:2500])" 2>/dev/null || head -c 2500 /tmp/settings.json)
          printf '::notice title=script-settings-raw (%s)::%s\n' "$SCODE" "$FULL"

          echo "## Script secrets (metadata only)" >> "$GITHUB_STEP_SUMMARY"
          CODE=$(curl -sS -o /tmp/secrets_list.json -w "%{http_code}" \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/scripts/${WORKER_NAME}/secrets" \
            -H "Authorization: Bearer ${CF_API_TOKEN}")
          FLAT=$(python3 -c "import json; d=json.load(open('/tmp/secrets_list.json')); print(json.dumps(d))" 2>/dev/null || cat /tmp/secrets_list.json | tr '\n' ' ')
          printf '::notice title=secrets-on-deployed (%s)::%s\n' "$CODE" "$(echo "$FLAT" | head -c 900)"

      - name: Wait for edge propagation
        run: sleep 60

      - name: Post-check live runtime state
        run: |
          set -e
          pass=1
          {
            echo "## Post-check: live runtime state (after rotate + redeploy)"
            echo "### /health"
            HEALTH=$(curl -sS https://api.saddamalkadi.com/health)
            echo "$HEALTH" | python3 -m json.tool
            printf '::notice title=live-health-raw::%s\n' "$(printf '%s' "$HEALTH" | head -c 1500)"
            echo "### /auth/config"
            CFG=$(curl -sS https://api.saddamalkadi.com/auth/config)
            echo "$CFG" | python3 -m json.tool

            echo "### /auth/diagnose (admin email + password 123456)"
            DIAG=$(curl -sS -X POST -H 'Content-Type: application/json' \
              https://api.saddamalkadi.com/auth/diagnose \
              -d '{"email":"tntntt830@gmail.com","password":"123456"}')
            echo "$DIAG" | python3 -m json.tool
            printf '::notice title=live-diagnose-raw::%s\n' "$(printf '%s' "$DIAG" | head -c 800)"

            echo "### /auth/login (admin email + password 123456)"
            LOGIN=$(curl -sS -X POST -H 'Content-Type: application/json' \
              https://api.saddamalkadi.com/auth/login \
              -d '{"email":"tntntt830@gmail.com","password":"123456"}')
            echo "$LOGIN" | python3 -m json.tool
            printf '::notice title=live-login-raw::%s\n' "$(printf '%s' "$LOGIN" | head -c 500)"

            echo "### /v1/credits"
            CREDITS=$(curl -sS -H 'Origin: https://app.saddamalkadi.com' https://api.saddamalkadi.com/v1/credits)
            echo "$CREDITS" | python3 -m json.tool

            echo "### /v1/chat/completions"
            CHAT=$(curl -sS -X POST -H 'Origin: https://app.saddamalkadi.com' -H 'Content-Type: application/json' \
              https://api.saddamalkadi.com/v1/chat/completions \
              -d '{"model":"openai/gpt-4o-mini","messages":[{"role":"user","content":"ping"}],"max_tokens":5}')
            echo "$CHAT" | head -c 600
            echo
          } | tee "$GITHUB_STEP_SUMMARY"

          # Structured validation (retry /health — edge propagation can lag deploy)
          python3 - <<'PY'
          import json, sys, time, urllib.request
          def fetch(url, method='GET', body=None, headers=None):
              req = urllib.request.Request(url, method=method,
                  data=(body.encode() if isinstance(body,str) else body),
                  headers=headers or {})
              try:
                  with urllib.request.urlopen(req, timeout=15) as r:
                      return r.status, json.loads(r.read().decode() or 'null')
              except urllib.error.HTTPError as e:
                  try: return e.code, json.loads(e.read().decode() or 'null')
                  except Exception: return e.code, None
              except Exception as e:
                  return 0, {'error': str(e)}

          errors = []
          health = None
          for attempt in range(24):
              _, health = fetch('https://api.saddamalkadi.com/health')
              if health and health.get('upstream_key_valid') and health.get('admin_password_ready'):
                  print(f'::notice title=live-health::OK after attempt {attempt + 1}')
                  break
              time.sleep(5)
          else:
              errors.append(f'/health never reached upstream_key_valid+admin_password_ready (last={health})')
          cfg_code, cfg = fetch('https://api.saddamalkadi.com/auth/config')
          if not cfg or not cfg.get('adminPasswordEnabled'):
              errors.append(f'adminPasswordEnabled not true: {cfg}')
          ml = (cfg or {}).get('adminLoginMethod') or ''
          if 'password' not in ml:
              errors.append(f'adminLoginMethod does not expose password login: {cfg}')
