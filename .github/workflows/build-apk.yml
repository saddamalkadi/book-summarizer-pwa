name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    if: ${{ github.event_name != 'push' || github.event.head_commit == null || !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install

      - name: Sync web into www (Capacitor)
        run: npm run sync:web

      - name: Sync Capacitor (generates capacitor-cordova-android-plugins)
        run: npx cap sync android

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install required SDK components
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Grant Gradle wrapper permission
        run: chmod +x android/gradlew

      - name: Extract version from build.gradle
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName' android/app/build.gradle | grep -oP '"\K[^"]+')
          VERSION_CODE=$(grep 'versionCode' android/app/build.gradle | grep -oP '\d+')
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "Version: $VERSION_NAME ($VERSION_CODE)"

      - name: Build release APK and AAB
        working-directory: android
        run: ./gradlew assembleRelease bundleRelease --no-daemon --stacktrace

      - name: Stage APK and AAB for Pages and GitHub Release
        run: |
          set -e
          mkdir -p downloads
          SRC_APK="android/app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$SRC_APK" ]; then
            SRC_APK="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          fi
          if [ ! -f "$SRC_APK" ]; then
            echo "Release APK missing under android/app/build/outputs/apk/release/" >&2
            ls -la android/app/build/outputs/apk/release/ || true
            exit 1
          fi
          SRC_AAB="android/app/build/outputs/bundle/release/app-release.aab"
          if [ ! -f "$SRC_AAB" ]; then
            echo "Missing $SRC_AAB" >&2
            exit 1
          fi
          cp "$SRC_APK" "AI-Workspace-Studio-latest.apk"
          cp "$SRC_APK" "downloads/ai-workspace-studio-latest.apk"
          VN="${{ steps.version.outputs.version_name }}"
          cp "$SRC_APK" "downloads/ai-workspace-studio-v${VN}-android-release.apk"
          cp "$SRC_AAB" "downloads/ai-workspace-studio-latest.aab"
          cp "$SRC_AAB" "downloads/ai-workspace-studio-v${VN}-android-release.aab"
          echo "APK: $(du -sh AI-Workspace-Studio-latest.apk)"
          ls -la downloads/

      - name: Upload APK artifact (GitHub Actions)
        uses: actions/upload-artifact@v4
        with:
          name: AI-Workspace-Studio-v${{ steps.version.outputs.version_name }}
          path: AI-Workspace-Studio-latest.apk
          retention-days: 30

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version_name }}
          name: "AI Workspace Studio v${{ steps.version.outputs.version_name }}"
          body: |
            ## AI Workspace Studio v${{ steps.version.outputs.version_name }}

            **نسخة تجربة ما قبل المتجر — Android APK**

            - **versionCode**: ${{ steps.version.outputs.version_code }}
            - **Platform**: Android 7.0+ (API 24+)
            - **Build**: `assembleRelease` + `bundleRelease`. عند توفر `keystore.properties` يُستخدم توقيع الإصدار؛ وإلا يُستخدم توقيع debug في CI لضمان قابلية التثبيت للتجربة.

            ### التثبيت (APK)
            1. حمّل ملف `AI-Workspace-Studio-latest.apk`
            2. فعّل «مصادر غير معروفة» عند الحاجة
            3. ثبّت التطبيق

            ### الملفات على GitHub Pages
            - `downloads/ai-workspace-studio-latest.apk`
            - `downloads/ai-workspace-studio-v${{ steps.version.outputs.version_name }}-android-release.apk`
            - AAB (للنشر إلى Play Console فقط): `downloads/ai-workspace-studio-v${{ steps.version.outputs.version_name }}-android-release.aab`
          files: |
            AI-Workspace-Studio-latest.apk
            downloads/ai-workspace-studio-v${{ steps.version.outputs.version_name }}-android-release.aab
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit binaries to downloads/ for GitHub Pages
        run: |
          set -e
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add downloads/*.apk downloads/*.aab
          if git diff --staged --quiet; then
            echo "No download binary changes to commit"
          else
            git commit -m "chore: sync Android release APK/AAB to downloads [skip ci]"
            git fetch origin "${GITHUB_REF_NAME}"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
