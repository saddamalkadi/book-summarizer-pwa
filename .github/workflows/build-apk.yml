name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'ci: publish Android')"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install

      - name: Prepare www directory for Capacitor
        run: |
          mkdir -p www/icons
          cp index.html app.js sw.js manifest.webmanifest logo.svg www/ 2>/dev/null || true
          cp auth-bridge.html www/ 2>/dev/null || true
          cp icons/*.webp www/icons/ 2>/dev/null || true
          echo "www/ contents:"; ls www/

      - name: Sync Capacitor (generates capacitor-cordova-android-plugins)
        run: npx cap sync android

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install required SDK components
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Grant Gradle wrapper permission
        run: chmod +x android/gradlew

      - name: Extract version from build.gradle
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName' android/app/build.gradle | grep -oP '"\K[^"]+')
          VERSION_CODE=$(grep 'versionCode' android/app/build.gradle | grep -oP '\d+')
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "Version: $VERSION_NAME ($VERSION_CODE)"

      - name: Build release APK (signed with debug key fallback when no release keystore is provided)
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Stage release APK outputs
        run: |
          APK_SRC="android/app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$APK_SRC" ]; then
            APK_SRC="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          fi
          if [ ! -f "$APK_SRC" ]; then
            echo "Release APK not found, falling back to debug."
            cd android && ./gradlew assembleDebug --no-daemon --stacktrace && cd -
            APK_SRC="android/app/build/outputs/apk/debug/app-debug.apk"
          fi
          echo "Selected APK source: $APK_SRC"
          cp "$APK_SRC" AI-Workspace-Studio-latest.apk
          echo "APK size: $(du -sh AI-Workspace-Studio-latest.apk)"

      - name: Publish APK to downloads/ on main
        if: github.ref == 'refs/heads/main'
        run: |
          set -e
          mkdir -p downloads
          cp AI-Workspace-Studio-latest.apk downloads/ai-workspace-studio-latest.apk
          cp AI-Workspace-Studio-latest.apk "downloads/ai-workspace-studio-v${{ steps.version.outputs.version_name }}-android-release.apk"
          git config user.email "deploy@aistudio.bot"
          git config user.name "AI Studio Deploy"
          git add downloads/ai-workspace-studio-latest.apk "downloads/ai-workspace-studio-v${{ steps.version.outputs.version_name }}-android-release.apk" || true
          if ! git diff --cached --quiet; then
            git commit -m "ci: publish Android v${{ steps.version.outputs.version_name }} APK to downloads/"
            git push origin HEAD:main
          else
            echo "Downloads already up-to-date."
          fi

      - name: Upload APK artifact (GitHub Actions)
        uses: actions/upload-artifact@v4
        with:
          name: AI-Workspace-Studio-v${{ steps.version.outputs.version_name }}
          path: AI-Workspace-Studio-latest.apk
          retention-days: 30

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version_name }}
          name: "AI Workspace Studio v${{ steps.version.outputs.version_name }}"
          body: |
            ## AI Workspace Studio v${{ steps.version.outputs.version_name }}

            **تطبيق مساحة العمل العربية بالذكاء الاصطناعي**

            - **Build**: ${{ steps.version.outputs.version_code }}
            - **Platform**: Android 7.0+
            - **Type**: نسخة تجريبية للتثبيت المباشر (خارج المتجر)

            ### التثبيت
            1. حمّل ملف `AI-Workspace-Studio-latest.apk`
            2. فعّل "مصادر غير معروفة" في إعدادات الأمان
            3. افتح الملف وثبّت التطبيق

            ### الجديد
            - مساحة عمل عربية بالذكاء الاصطناعي مع البوابة الرسمية
            - محادثة عربية مع TTS/STT
            - تحليل الملفات والمستندات
            - دعم Google OAuth وتسجيل الدخول بالبريد
          files: AI-Workspace-Studio-latest.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
