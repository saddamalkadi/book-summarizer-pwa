name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install

      - name: Prepare www directory for Capacitor
        run: |
          mkdir -p www/icons
          cp index.html app.js sw.js manifest.webmanifest logo.svg www/ 2>/dev/null || true
          cp auth-bridge.html www/ 2>/dev/null || true
          cp icons/*.webp www/icons/ 2>/dev/null || true
          echo "www/ contents:"; ls www/

      - name: Sync Capacitor (generates capacitor-cordova-android-plugins)
        run: npx cap sync android

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install required SDK components
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Grant Gradle wrapper permission
        run: chmod +x android/gradlew

      - name: Extract version from build.gradle
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName' android/app/build.gradle | grep -oP '"\K[^"]+')
          VERSION_CODE=$(grep 'versionCode' android/app/build.gradle | grep -oP '\d+')
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "Version: $VERSION_NAME ($VERSION_CODE)"

      - name: Build release APK (R8/shrink + debug-signed fallback)
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Rename APK for release
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk \
             AI-Workspace-Studio-latest.apk
          echo "APK size: $(du -sh AI-Workspace-Studio-latest.apk)"

      - name: Upload APK artifact (GitHub Actions)
        uses: actions/upload-artifact@v4
        with:
          name: AI-Workspace-Studio-v${{ steps.version.outputs.version_name }}
          path: AI-Workspace-Studio-latest.apk
          retention-days: 30

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version_name }}
          name: "AI Workspace Studio v${{ steps.version.outputs.version_name }}"
          body: |
            ## AI Workspace Studio v${{ steps.version.outputs.version_name }}

            **تطبيق مساحة العمل العربية بالذكاء الاصطناعي**

            - **Build**: ${{ steps.version.outputs.version_code }}
            - **Platform**: Android 7.0+ (API ${{ steps.version.outputs.version_code >= '851' && '24' || '24' }}+)
            - **Type**: Release APK (تثبيت مباشر — ليس عبر متجر Google Play)

            ### التثبيت
            1. حمّل ملف `AI-Workspace-Studio-latest.apk`
            2. فعّل "مصادر غير معروفة" في إعدادات الأمان
            3. افتح الملف وثبّت التطبيق

            ### الجديد
            - مساحة العمل العربية بالذكاء الاصطناعي مع دعم OpenRouter
            - محادثة عربية مع TTS/STT
            - تحليل الملفات والمستندات
            - دعم Google OAuth وتسجيل الدخول بالبريد
          files: AI-Workspace-Studio-latest.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
