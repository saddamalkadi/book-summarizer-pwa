import java.util.Properties

apply plugin: 'com.android.application'

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('keystore.properties')
def hasReleaseKeystore = false

if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
    hasReleaseKeystore = ['storeFile', 'storePassword', 'keyAlias', 'keyPassword'].every {
        String.valueOf(keystoreProperties[it] ?: '').trim()
    }
}

android {
    namespace "com.saddamalkadi.aiworkspace"
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.saddamalkadi.aiworkspace"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 976
        versionName "9.6.16"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    /**
     * v9.6.16 — Use an in-repo deterministic signing keystore for both
     * `debug` and `release` builds so the published APK keeps the SAME
     * SHA-1 fingerprint across CI runs and across CI runner-image rotations.
     *
     * Background: previous releases (v9.6.10 … v9.6.14) coincidentally shared
     * SHA-1 4B:38:17:53:…:CB:4C:01 because GitHub's hosted runner image kept
     * the same auto-generated `~/.android/debug.keystore` during that window.
     * When the runner image rotated (post-2026-04-26), every fresh runner
     * generated a new debug keystore → APK SHA-1 drifted → Google Sign-In
     * registered against the old SHA-1 returned DEVELOPER_ERROR.
     *
     * The `aistudio-cicd.keystore` checked into android/ is a deterministic
     * debug-style key, NOT a Play upload key. It only protects the public
     * test APK distributed via /downloads. The matching SHA-1 must be
     * registered with the Google OAuth Android client.
     */
    signingConfigs {
        cicd {
            storeFile rootProject.file('aistudio-cicd.keystore')
            storePassword 'aistudio'
            keyAlias 'aistudio'
            keyPassword 'aistudio'
        }
        release {
            if (hasReleaseKeystore) {
                storeFile rootProject.file(String.valueOf(keystoreProperties['storeFile']))
                storePassword String.valueOf(keystoreProperties['storePassword'])
                keyAlias String.valueOf(keystoreProperties['keyAlias'])
                keyPassword String.valueOf(keystoreProperties['keyPassword'])
            }
        }
    }
    buildTypes {
        debug {
            // Pin debug builds to the deterministic CI keystore too, so the
            // public `assembleDebug` artifact published to /downloads always
            // carries the same signing certificate.
            signingConfig signingConfigs.cicd
        }
        release {
            minifyEnabled true
            shrinkResources true
            debuggable false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            if (hasReleaseKeystore) {
                signingConfig signingConfigs.release
            } else {
                // No Play upload key configured → still use the deterministic
                // CI keystore so the test AAB/APK are installable AND
                // signature-stable across runs.
                signingConfig signingConfigs.cicd
            }
        }
    }
    packagingOptions {
        resources {
            excludes += [
                'META-INF/AL2.0',
                'META-INF/LGPL2.1',
                'META-INF/*.kotlin_module',
                'META-INF/LICENSE*',
                'META-INF/NOTICE*',
                'META-INF/*.version'
            ]
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    // v9.6.16 — Required for WebSettingsCompat.setAlgorithmicDarkeningAllowed(...)
    // so we can opt the WebView out of Android 13+ auto-darkening, which on
    // some devices was painting the chat background black even though the
    // CSS pins a light theme. The version is already declared in variables.gradle.
    implementation "androidx.webkit:webkit:$androidxWebkitVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
