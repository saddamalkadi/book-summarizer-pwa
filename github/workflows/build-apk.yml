name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install

      - name: Prepare web assets
        run: npm run sync:web

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install required SDK components
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Grant Gradle wrapper permission
        run: chmod +x android/gradlew

      - name: Extract version from build.gradle
        id: version
        run: |
          VERSION_NAME=$(sed -n 's/.*versionName "\(.*\)".*/\1/p' android/app/build.gradle | head -n 1)
          VERSION_CODE=$(sed -n 's/.*versionCode \([0-9][0-9]*\).*/\1/p' android/app/build.gradle | head -n 1)
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk AI-Workspace-Studio-latest.apk
          cp android/app/build/outputs/apk/release/app-release.apk downloads/ai-workspace-studio-latest.apk
          cp android/app/build/outputs/apk/release/app-release.apk downloads/ai-workspace-studio-v${{ steps.version.outputs.version_name }}-android-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-Workspace-Studio-v${{ steps.version.outputs.version_name }}
          path: AI-Workspace-Studio-latest.apk
          retention-days: 30
